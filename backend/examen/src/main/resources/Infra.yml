openapi: 3.0.3
info:
  title: EventPlanner API
  description: "API de gestion d'événements. Gérée par l'équipe Infrastructure (Dev 4)."
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Serveur local de développement

paths:
  # --- AUTHENTICATION ---
  /api/auth/login:
    post:
      summary: Connexion admin
      tags: [ Auth ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Connexion réussie
        '401':
          description: Identifiants invalides

  # --- EVENTS ---
  /api/events:
    get:
      summary: Lister tous les événements
      tags: [ Events ]
      responses:
        '200':
          description: Liste des événements
    post:
      summary: Créer un événement
      tags: [ Events ]
      security: [ { bearerAuth: [ ] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Event' }
      responses:
        '201':
          description: Événement créé
        '400':
          description: Données invalides
        '401':
          description: Non autorisé

    # --- SESSIONS (Enfant de l'événement) ---
  /api/events/{eventId}/sessions/{sessionId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: integer }
      - name: sessionId
        in: path
        required: true
        schema: { type: integer }

    get:
      summary: Détails de la session {sessionId} de l'événement {eventId}
      tags: [ Sessions ]
      responses:
        '200':
          description: Session trouvée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session introuvable

    delete:
        summary: Supprimer la session {sessionId}
        tags: [ Sessions ]
        responses:
          '204':
            description: Session supprimée avec succès
          '404':
            description: Session introuvable
  # --- SESSIONS ---
  /api/sessions:
    get:
      summary: Lister les sessions
      tags: [ Sessions ]
      responses:
        '200':
          description: Liste des sessions
        '404':
          description: Ressource introuvable


# --- SECTION DÉFINITIONS (Boîte à outils) ---
components:
  schemas:
    # Modèles de données
    Event:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        title: { type: string }
        description: { type: string }
        start_date: { type: string, format: date-time }
        end_date: { type: string, format: date-time }
        location: { type: string }
        admin_id: { type: integer }

    Session:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        event_id: { type: integer }

  securitySchemes:
    # Méthodes d'authentification
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT